name: Split agenda into focused page

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Move booking experience to dedicated page
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import re

          root = Path('index.html')
          text = root.read_text(encoding='utf-8')
          text = text.replace('href="#agenda"', 'href="/agenda/"')
          text, removed = re.subn(r'<section class="agenda-section" id="agenda">.*?</section>', '', text, count=1, flags=re.S)
          if removed != 1:
              raise RuntimeError(f'Agenda section removal count: {removed}')
          text = re.sub(r'\s*/\* Embedded booking calendar \*/.*?(?=</style>)', '\n', text, count=1, flags=re.S)

          cta_css = '/* Focused booking CTA */ .booking-cta{padding:96px 0;background:var(--navy);color:#fff;text-align:center}.booking-cta-inner{max-width:820px;margin:auto}.booking-cta h2{font-size:clamp(3.2rem,6vw,6rem);max-width:11ch;margin:16px auto 0}.booking-cta p{max-width:680px;margin:24px auto 0;color:rgba(255,255,255,.66)}.booking-cta .button{margin-top:30px}@media(max-width:640px){.booking-cta{padding:76px 0}.booking-cta h2{font-size:3.4rem}}'
          if 'Focused booking CTA' not in text:
              text = text.replace('</style>', cta_css + '</style>', 1)
          cta_html = '<section class="booking-cta"><div class="container booking-cta-inner" data-reveal><span class="section-label" style="color:var(--gold-soft)">¿Listo para comenzar?</span><h2>Agenda una conversación inicial.</h2><p>Reserva un espacio de 30 minutos para conocer tu situación, tus objetivos y las decisiones financieras que quieres organizar.</p><a class="button gold" href="/agenda/">Ir a la agenda →</a></div></section>'
          if 'class="booking-cta"' not in text:
              text = text.replace('</main>', cta_html + '</main>', 1)
          root.write_text(text, encoding='utf-8')

          agenda_b64 = ''
          agenda_dir = Path('agenda')
          agenda_dir.mkdir(exist_ok=True)
          (agenda_dir / 'index.html').write_text(base64.b64decode(agenda_b64).decode('utf-8'), encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html agenda/index.html
          git diff --cached --quiet || git commit -m "Move booking calendar to dedicated agenda page"
          git push
