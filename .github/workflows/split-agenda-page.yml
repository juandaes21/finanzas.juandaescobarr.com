name: Split agenda into focused page

on:
  push:
    paths:
      - '.github/workflows/split-agenda-page.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Move booking experience to dedicated page
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('index.html')
          text = root.read_text(encoding='utf-8')

          # Point every booking CTA to the dedicated booking page.
          text = text.replace('href="#agenda"', 'href="/agenda/"')

          # Remove the embedded agenda section from the main landing.
          text, removed = re.subn(
              r'<section class="agenda-section" id="agenda">.*?</section>',
              '',
              text,
              count=1,
              flags=re.S,
          )
          if removed != 1:
              raise RuntimeError(f'Agenda section removal count: {removed}')

          # Remove the old agenda-specific CSS block.
          text = re.sub(
              r'\s*/\* Embedded booking calendar \*/.*?(?=</style>)',
              '\n',
              text,
              count=1,
              flags=re.S,
          )

          # Add a focused final CTA on the landing.
          cta_css = '''
          /* Focused booking CTA */
          .booking-cta{padding:96px 0;background:var(--navy);color:#fff;text-align:center}
          .booking-cta-inner{max-width:820px;margin:auto}
          .booking-cta h2{font-size:clamp(3.2rem,6vw,6rem);max-width:11ch;margin:16px auto 0}
          .booking-cta p{max-width:680px;margin:24px auto 0;color:rgba(255,255,255,.66)}
          .booking-cta .button{margin-top:30px}
          @media(max-width:640px){.booking-cta{padding:76px 0}.booking-cta h2{font-size:3.4rem}}
          '''
          if 'Focused booking CTA' not in text:
              text = text.replace('</style>', cta_css + '\n</style>', 1)

          cta_html = '''<section class="booking-cta"><div class="container booking-cta-inner" data-reveal><span class="section-label" style="color:var(--gold-soft)">¿Listo para comenzar?</span><h2>Agenda una conversación inicial.</h2><p>Reserva un espacio de 30 minutos para conocer tu situación, tus objetivos y las decisiones financieras que quieres organizar.</p><a class="button gold" href="/agenda/">Ir a la agenda →</a></div></section>'''
          if 'class="booking-cta"' not in text:
              text = text.replace('</main>', cta_html + '\n</main>', 1)

          root.write_text(text, encoding='utf-8')

          agenda = Path('agenda')
          agenda.mkdir(exist_ok=True)
          agenda_html = '''<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agenda una conversación | Finanzas con Esco</title>
  <meta name="description" content="Reserva una conversación inicial de 30 minutos con Finanzas con Esco.">
  <meta name="theme-color" content="#071a2c">
  <link rel="canonical" href="https://finanzas.juandaescobarr.com/agenda/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
  <style>
    :root{--navy:#071a2c;--navy-2:#0b2944;--gold:#d5a354;--gold-soft:#f0d39e;--paper:#f7f4ee;--cream:#eee6d7;--ink:#11202d;--muted:#62707b;--line:rgba(7,26,44,.12);--shadow:0 30px 90px rgba(2,15,28,.16);--serif:"Playfair Display",Georgia,serif;--sans:"DM Sans",Arial,sans-serif}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}.container{width:min(1180px,calc(100% - 40px));margin:auto}.topbar{padding:18px 0}.nav{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:9px 12px;border-radius:999px;background:var(--navy);color:#fff;box-shadow:0 18px 50px rgba(0,0,0,.18)}.brand{display:flex;align-items:center;gap:11px}.mark{width:43px;height:43px;display:grid;place-items:center;border-radius:50%;background:var(--gold);color:var(--navy);font-weight:800}.brand span{font-size:.74rem;line-height:1.15;font-weight:700;letter-spacing:.08em;text-transform:uppercase}.brand span b{display:block;color:var(--gold-soft)}.back{padding:10px 16px;border:1px solid rgba(255,255,255,.18);border-radius:999px;font-size:.75rem;font-weight:700}.hero{padding:54px 0 78px}.grid{display:grid;grid-template-columns:.72fr 1.28fr;gap:24px;align-items:start}.copy{position:sticky;top:24px;padding:40px;border-radius:30px;background:var(--navy);color:#fff;box-shadow:var(--shadow)}.eyebrow{color:var(--gold-soft);font-size:.7rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase}.copy h1{margin:20px 0 0;font-family:var(--serif);font-size:clamp(3.5rem,5.8vw,6.2rem);line-height:.98;letter-spacing:-.03em}.copy p{margin:24px 0 0;color:rgba(255,255,255,.68)}.details{display:grid;gap:13px;margin-top:30px}.detail{display:grid;grid-template-columns:38px 1fr;gap:12px;align-items:start;padding-top:14px;border-top:1px solid rgba(255,255,255,.12)}.detail b{width:34px;height:34px;display:grid;place-items:center;border-radius:50%;background:rgba(213,163,84,.14);color:var(--gold);font-size:.72rem}.detail strong{display:block;font-size:.84rem}.detail span{display:block;margin-top:2px;color:rgba(255,255,255,.53);font-size:.75rem}.calendar-shell{overflow:hidden;border:1px solid var(--line);border-radius:30px;background:#fff;box-shadow:var(--shadow)}.calendar-top{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:20px 23px;border-bottom:1px solid var(--line)}.calendar-top strong{font-size:.9rem}.calendar-top span{color:var(--muted);font-size:.73rem}.calendar{display:block;width:100%;height:760px;border:0;background:#fff}.fallback{padding:16px 22px;border-top:1px solid var(--line);text-align:center;color:var(--muted);font-size:.74rem}.fallback a{color:#916a31;font-weight:700;text-decoration:underline;text-underline-offset:3px}.legal{max-width:920px;margin:0 auto;padding:0 0 44px;text-align:center;color:var(--muted);font-size:.7rem}.legal a{font-weight:700;color:#916a31}@media(max-width:900px){.grid{grid-template-columns:1fr}.copy{position:relative;top:auto}.calendar{height:700px}}@media(max-width:640px){.container{width:min(100% - 24px,1180px)}.topbar{padding:10px 0}.nav{border-radius:22px}.brand span{font-size:.66rem}.back{padding:9px 12px;font-size:.68rem}.hero{padding:24px 0 56px}.copy{padding:28px}.copy h1{font-size:3.6rem}.calendar-top{align-items:flex-start;flex-direction:column}.calendar{height:650px}.calendar-shell{border-radius:22px}}
  </style>
</head>
<body>
  <header class="topbar"><div class="container nav"><a class="brand" href="/"><span class="mark">FCE</span><span>FINANZAS <b>CON ESCO</b></span></a><a class="back" href="/">← Volver</a></div></header>
  <main class="hero"><div class="container grid"><section class="copy"><span class="eyebrow">Conversación inicial</span><h1>Elige el momento que mejor te funcione.</h1><p>Reserva un espacio para conocer tu situación, tus objetivos y las decisiones financieras que quieres organizar.</p><div class="details"><div class="detail"><b>30</b><div><strong>30 minutos</strong><span>Una primera conversación concreta y sin documentos previos.</span></div></div><div class="detail"><b>G</b><div><strong>Google Meet</strong><span>Recibirás automáticamente el enlace de la reunión.</span></div></div><div class="detail"><b>01</b><div><strong>Espacio exploratorio</strong><span>No constituye una recomendación financiera personalizada.</span></div></div></div></section><section class="calendar-shell"><div class="calendar-top"><strong>Conversación inicial | Finanzas con Esco</strong><span>Selecciona fecha y hora</span></div><iframe class="calendar" src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ34glV7pSYQhfPxw6kEDHSMjfsciawVvHatgqjHqmhop9EUawsLJ44o5FtmPZfvGmNKzLChqsgW?gv=true" title="Agenda de Finanzas con Esco" loading="eager" frameborder="0"></iframe><div class="fallback">¿No carga la agenda? <a href="https://calendar.app.google/DqNvgyeTuFHVvCfd8" target="_blank" rel="noreferrer">Abrirla en Google Calendar ↗</a></div></section></div></main>
  <p class="legal">La conversación es exploratoria y no constituye una recomendación financiera personalizada. <a href="/">Volver a Finanzas con Esco</a></p>
</body>
</html>'''
          (agenda / 'index.html').write_text(agenda_html, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html agenda/index.html
          git diff --cached --quiet || git commit -m "Move booking calendar to dedicated agenda page"
          git push
