name: Embed Google Calendar booking

on:
  push:
    paths:
      - '.github/workflows/embed-google-calendar.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add embedded appointment calendar
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          short_url = 'https://calendar.app.google/DqNvgyeTuFHVvCfd8'
          embed_url = 'https://calendar.google.com/calendar/appointments/schedules/AcZssZ34glV7pSYQhfPxw6kEDHSMjfsciawVvHatgqjHqmhop9EUawsLJ44o5FtmPZfvGmNKzLChqsgW?gv=true'

          text = re.sub(
              r'href="https://calendar\.app\.google/DqNvgyeTuFHVvCfd8"(?:\s+target="_blank")?(?:\s+rel="noreferrer")?',
              'href="#agenda"',
              text,
          )

          agenda_css = '''
          /* Embedded booking calendar */
          .agenda-section{padding:112px 0;background:var(--cream)}
          .agenda-layout{display:grid;grid-template-columns:.72fr 1.28fr;gap:24px;align-items:start}
          .agenda-copy{position:sticky;top:110px;padding:38px;border-radius:30px;background:var(--navy);color:#fff;box-shadow:var(--shadow)}
          .agenda-copy .section-label{color:var(--gold-soft)}
          .agenda-copy h2{margin-top:18px;font-size:clamp(3rem,5vw,5.2rem);max-width:9ch}
          .agenda-copy p{margin:22px 0 0;color:rgba(255,255,255,.67)}
          .agenda-details{display:grid;gap:13px;margin-top:28px}
          .agenda-detail{display:grid;grid-template-columns:34px 1fr;gap:12px;align-items:start;padding-top:13px;border-top:1px solid rgba(255,255,255,.12)}
          .agenda-detail b{width:30px;height:30px;display:grid;place-items:center;border-radius:50%;background:rgba(213,163,84,.14);color:var(--gold);font-size:.72rem}
          .agenda-detail strong{display:block;font-size:.82rem}
          .agenda-detail span{display:block;margin-top:2px;color:rgba(255,255,255,.52);font-size:.75rem}
          .calendar-shell{overflow:hidden;border:1px solid var(--line);border-radius:30px;background:#fff;box-shadow:var(--shadow)}
          .calendar-top{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:20px 23px;border-bottom:1px solid var(--line);background:#fff}
          .calendar-top strong{font-size:.88rem}
          .calendar-top span{color:var(--muted);font-size:.72rem}
          .calendar-frame{width:100%;height:760px;border:0;display:block;background:#fff}
          .calendar-fallback{padding:16px 22px;border-top:1px solid var(--line);text-align:center;background:#fff;color:var(--muted);font-size:.74rem}
          .calendar-fallback a{color:#916a31;font-weight:700;text-decoration:underline;text-underline-offset:3px}
          @media(max-width:900px){.agenda-layout{grid-template-columns:1fr}.agenda-copy{position:relative;top:auto}.calendar-frame{height:700px}}
          @media(max-width:640px){.agenda-section{padding:82px 0}.agenda-copy{padding:28px}.agenda-copy h2{font-size:3.25rem}.calendar-top{align-items:flex-start;flex-direction:column}.calendar-frame{height:640px}.calendar-shell{border-radius:22px}}
          '''

          if 'Embedded booking calendar' not in text:
              text = text.replace('</style>', agenda_css + '\n</style>', 1)

          agenda_html = f'''<section class="agenda-section" id="agenda"><div class="container agenda-layout"><div class="agenda-copy" data-reveal><span class="section-label">Agenda tu conversación</span><h2>Elige el momento que mejor te funcione.</h2><p>Reserva una conversación inicial para conocer tu situación, tus objetivos y las decisiones financieras que quieres organizar.</p><div class="agenda-details"><div class="agenda-detail"><b>30</b><div><strong>30 minutos</strong><span>Una primera conversación concreta y sin documentos previos.</span></div></div><div class="agenda-detail"><b>G</b><div><strong>Google Meet</strong><span>Recibirás automáticamente el enlace de la reunión.</span></div></div><div class="agenda-detail"><b>01</b><div><strong>Espacio exploratorio</strong><span>No constituye una recomendación financiera personalizada.</span></div></div></div></div><div class="calendar-shell" data-reveal><div class="calendar-top"><strong>Conversación inicial | Finanzas con Esco</strong><span>Selecciona fecha y hora</span></div><iframe class="calendar-frame" src="{embed_url}" title="Agenda de Finanzas con Esco" loading="lazy" frameborder="0"></iframe><div class="calendar-fallback">¿No carga la agenda? <a href="{short_url}" target="_blank" rel="noreferrer">Abrirla en Google Calendar ↗</a></div></div></div></section>'''

          if 'id="agenda"' not in text:
              if '</main>' not in text:
                  raise RuntimeError('Could not find </main> insertion point')
              text = text.replace('</main>', agenda_html + '\n</main>', 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Embed Google Calendar booking on landing"
          git push
