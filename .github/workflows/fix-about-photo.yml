name: Fix about section photo

on:
  push:
    paths:
      - '.github/workflows/fix-about-photo.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace broken about photo
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          photo_url = 'https://raw.githubusercontent.com/juandaes21/cv.juandaescobarr.com/main/f58bd69b-a414-46d6-858a-8eb59e659121-1_all_35799.jpg'

          pattern = r'(<div class="about-photo"[^>]*>\s*<img[^>]*src=")[^"]+("[^>]*>)'
          text, count = re.subn(pattern, rf'\1{photo_url}\2', text, count=1, flags=re.S)
          if count != 1:
              raise RuntimeError(f'About image replacement count: {count}')

          css = '''
          /* About portrait correction */
          .about-photo{overflow:hidden;background:#0b2944!important}
          .about-photo img{width:100%!important;height:100%!important;object-fit:cover!important;object-position:center 28%!important;transform:scale(1.01);filter:saturate(.97) contrast(1.02)}
          @media(max-width:900px){.about-photo img{object-position:center 25%!important}}
          @media(max-width:640px){.about-photo{min-height:430px!important}.about-photo img{object-position:center 23%!important;transform:none}}
          '''
          if 'About portrait correction' not in text:
              text = text.replace('</style>', css + '\n</style>', 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Replace broken about section image"
          git push
