name: Fix finance landing images

on:
  push:
    paths:
      - '.github/workflows/fix-finance-images.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-images:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fix image sources, crops and overlays
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          suit = 'https://raw.githubusercontent.com/juandaes21/cv.juandaescobarr.com/main/f58bd69b-a414-46d6-858a-8eb59e659121-1_all_35799.jpg'
          avatar = 'https://avatars.githubusercontent.com/u/128944526?v=4'

          # Replace the first two image sources without depending on large inline base64 payloads.
          text, n1 = re.subn(r'(<img alt="Juan David Escobar, creador de Finanzas con Esco" src=")[^"]+("[^>]*>)', rf'\1{suit}\2', text, count=1, flags=re.S)
          text, n2 = re.subn(r'(<img alt="Juan David Escobar" src=")[^"]+("[^>]*>)', rf'\1{avatar}\2', text, count=1, flags=re.S)
          if n1 != 1 or n2 != 1:
              raise RuntimeError(f'Image replacements failed: hero={n1}, about={n2}')

          replacements = {
              '.photo img{width:100%;height:100%;object-fit:cover;object-position:center 42%}': '.photo img{width:100%;height:100%;object-fit:cover;object-position:center 34%;background:#c9b696}',
              '.photo-caption{position:absolute;z-index:2;left:36px;right:36px;bottom:34px}': '.photo-caption{position:absolute;z-index:2;left:210px;right:24px;bottom:28px;text-align:right}',
              '.hero-card{position:absolute;left:-42px;bottom:175px;width:220px;': '.hero-card{position:absolute;z-index:3;left:-28px;bottom:18px;width:205px;',
              '.trust-line{position:absolute;right:-18px;top:80px;': '.trust-line{position:absolute;z-index:3;right:-10px;top:58px;',
              '.about-photo img{width:100%;height:100%;object-fit:cover}': '.about-photo img{width:100%;height:100%;object-fit:cover;object-position:center 38%;background:var(--navy)}',
              '.hero-card{left:18px}': '.hero-card{left:18px}.photo-caption{left:235px}',
              '.hero-card,.trust-line{display:none}': '.hero-card,.trust-line{display:none}.photo-caption{left:24px;right:24px;text-align:left}',
          }
          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Fix landing images and responsive crops"
          git push
