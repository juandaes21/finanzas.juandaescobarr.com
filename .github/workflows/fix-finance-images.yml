name: Fix finance landing images

on:
  push:
    paths:
      - '.github/workflows/fix-finance-images.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace embedded images and improve responsive crops
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          hero_url = 'https://raw.githubusercontent.com/juandaes21/cv.juandaescobarr.com/main/f58bd69b-a414-46d6-858a-8eb59e659121-1_all_35799.jpg'
          about_url = 'https://avatars.githubusercontent.com/u/128944526?v=4'

          text, hero_count = re.subn(
              r'(<img\s+alt="Juan David Escobar, creador de Finanzas con Esco"\s+src=")[^"]+("[^>]*>)',
              rf'\1{hero_url}\2',
              text,
              count=1,
              flags=re.S,
          )

          text, about_count = re.subn(
              r'(<div class="about-photo"[^>]*>\s*<img[^>]*src=")[^"]+("[^>]*>)',
              rf'\1{about_url}\2',
              text,
              count=1,
              flags=re.S,
          )

          if hero_count != 1:
              raise RuntimeError(f'Hero image replacement count: {hero_count}')
          if about_count != 1:
              raise RuntimeError(f'About image replacement count: {about_count}')

          image_fixes = '''
          /* Stable image presentation */
          .photo img{object-position:center 31%!important;transform:scale(1.015);background:#c9b696}
          .about-photo img{object-position:center 32%!important;transform:scale(1.01);background:var(--navy)}
          .photo-caption{left:210px!important;right:24px!important;bottom:26px!important;text-align:right}
          .hero-card{left:-22px!important;bottom:20px!important;width:205px!important}
          .trust-line{right:-8px!important;top:62px!important}
          @media(max-width:1100px){.hero-card,.trust-line{display:none!important}.photo-caption{left:28px!important;right:28px!important;text-align:left}}
          @media(max-width:900px){.hero-visual{max-width:560px;margin:0 auto}.photo img{object-position:center 29%!important}.about-photo img{object-position:center 28%!important}}
          @media(max-width:640px){.photo-shell{padding:10px}.photo{aspect-ratio:4/5}.photo img{object-position:center 27%!important;transform:scale(1)}.photo-caption{left:24px!important;right:24px!important;bottom:22px!important}.photo-caption strong{font-size:1.65rem}.about-photo{min-height:420px!important}.about-photo img{object-position:center 25%!important;transform:scale(1)}}
          '''

          if 'Stable image presentation' not in text:
              text = text.replace('</style>', image_fixes + '\n</style>', 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Fix landing images and responsive crops"
          git push
