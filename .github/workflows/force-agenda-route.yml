name: Force dedicated agenda route

on:
  push:
    paths:
      - '.github/workflows/force-agenda-route.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove legacy agenda anchor and add redirect
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          # Replace every legacy hash link with the dedicated page.
          text = text.replace('href="#agenda"', 'href="/agenda/"')
          text = text.replace("href='#agenda'", "href='/agenda/'")

          # Remove any old embedded agenda section that may still be present.
          text = re.sub(
              r'<section class="agenda-section" id="agenda">.*?</section>',
              '',
              text,
              flags=re.S,
          )

          # Redirect old saved/bookmarked URLs such as /#agenda.
          redirect = '''<script id="legacy-agenda-redirect">\nif (window.location.hash === "#agenda") {\n  window.location.replace("/agenda/");\n}\n</script>'''
          if 'legacy-agenda-redirect' not in text:
              text = text.replace('<head>', '<head>\n' + redirect, 1)

          if 'href="#agenda"' in text or 'id="agenda"' in text:
              raise RuntimeError('Legacy agenda anchor still exists in index.html')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Force legacy agenda links to dedicated page"
          git push
